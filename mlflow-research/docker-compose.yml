services:
  postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        - MLFLOW_VERSION=3.10.1
    container_name: mlflow-research
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BACKEND_STORE_URI=postgresql://mlflow:mlflow@postgres:5432/mlflow
      - ARTIFACT_ROOT=s3://research-geoai/mlflow/artifacts
      - MLFLOW_S3_ENDPOINT_URL=https://s3.nevaobjects.id
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=8080
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MLFLOW_ALLOWED_HOSTS=mlflow-geoai.stelarea.com,localhost,localhost:*
      - MLFLOW_CORS_ALLOWED_ORIGINS=https://mlflow-geoai.stelarea.com
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
